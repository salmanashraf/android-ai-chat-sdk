name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish. Leave empty to use gradle.properties, or the tag name for tag runs."
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(grep '^LIB_VERSION=' gradle.properties | cut -d= -f2)"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Unable to resolve release version" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Publishing version ${VERSION}"

      - name: Verify library and sample app
        run: ./gradlew :ai-chat-lib:testDebugUnitTest :sampleapp:compileDebugKotlin -PLIB_VERSION=${{ steps.release_version.outputs.version }}

      - name: Assemble release AAR
        run: ./gradlew :ai-chat-lib:assembleRelease -PLIB_VERSION=${{ steps.release_version.outputs.version }}

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_BASE64: ${{ secrets.GPG_PRIVATE_KEY_BASE64 }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          if [[ -z "${GPG_PRIVATE_KEY}" && -z "${GPG_PRIVATE_KEY_BASE64}" ]]; then
            echo "GPG_PRIVATE_KEY or GPG_PRIVATE_KEY_BASE64 secret is required for signed publication." >&2
            exit 1
          fi

          mkdir -p "${HOME}/.gnupg"
          chmod 700 "${HOME}/.gnupg"
          echo "pinentry-mode loopback" >> "${HOME}/.gnupg/gpg.conf"
          echo "allow-loopback-pinentry" >> "${HOME}/.gnupg/gpg-agent.conf"

          KEY_FILE="${RUNNER_TEMP}/signing-key.asc"
          python3 -c "import base64,os,sys; k=''.join((os.environ.get('GPG_PRIVATE_KEY','') or os.environ.get('GPG_PRIVATE_KEY_BASE64','')).split()); sys.stdout.buffer.write(k.encode() if k.startswith('-----') else base64.b64decode(k.replace('-','+').replace('_','/')+'='*(-len(k)%4)))" > "${KEY_FILE}"

          if ! grep -q "BEGIN PGP PRIVATE KEY BLOCK" "${KEY_FILE}"; then
            echo "The configured GPG private key secret is not an ASCII-armored private key." >&2
            exit 1
          fi

          gpg --batch --import "${KEY_FILE}"
          gpgconf --kill gpg-agent

          mkdir -p "${HOME}/.gradle"
          {
            echo "signing.gnupg.passphrase=${GPG_PASSPHRASE}"
          } >> "${HOME}/.gradle/gradle.properties"

      - name: Build signed Central Portal bundle
        run: ./gradlew :ai-chat-lib:bundleCentralComponent -PLIB_VERSION=${{ steps.release_version.outputs.version }}

      - name: Upload Central Portal bundle
        uses: actions/upload-artifact@v4
        with:
          name: aichatlib-${{ steps.release_version.outputs.version }}-central-portal-bundle
          path: ai-chat-lib/build/central-component/aichatlib-${{ steps.release_version.outputs.version }}-component.zip
          if-no-files-found: error

      - name: Upload and publish to Maven Central
        id: central_publish
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        shell: bash
        run: |
          if [[ -z "${CENTRAL_PORTAL_USERNAME}" || -z "${CENTRAL_PORTAL_PASSWORD}" ]]; then
            echo "CENTRAL_PORTAL_USERNAME and CENTRAL_PORTAL_PASSWORD secrets are required for automated Central Portal publishing." >&2
            exit 1
          fi

          BUNDLE="ai-chat-lib/build/central-component/aichatlib-${RELEASE_VERSION}-component.zip"
          if [[ ! -f "${BUNDLE}" ]]; then
            echo "Missing Central Portal bundle: ${BUNDLE}" >&2
            exit 1
          fi

          AUTH_TOKEN="$(printf '%s:%s' "${CENTRAL_PORTAL_USERNAME}" "${CENTRAL_PORTAL_PASSWORD}" | base64 | tr -d '\n')"
          DEPLOYMENT_NAME="aichatlib-${RELEASE_VERSION}"
          UPLOAD_URL="https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC&name=${DEPLOYMENT_NAME}"

          DEPLOYMENT_ID="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${AUTH_TOKEN}" \
            --form "bundle=@${BUNDLE};type=application/octet-stream" \
            "${UPLOAD_URL}")"

          if [[ -z "${DEPLOYMENT_ID}" ]]; then
            echo "Central Portal upload did not return a deployment id." >&2
            exit 1
          fi

          echo "deployment_id=${DEPLOYMENT_ID}" >> "${GITHUB_OUTPUT}"
          echo "Central Portal deployment id: ${DEPLOYMENT_ID}"

          for attempt in {1..60}; do
            STATUS_JSON="$(curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${AUTH_TOKEN}" \
              "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}")"

            STATE="$(python3 -c 'import json,sys; print(json.load(sys.stdin).get("deploymentState", ""))' <<< "${STATUS_JSON}")"
            echo "Central Portal deployment state: ${STATE}"

            case "${STATE}" in
              PUBLISHED)
                echo "Deployment published to Maven Central."
                exit 0
                ;;
              FAILED)
                echo "${STATUS_JSON}" >&2
                exit 1
                ;;
              PENDING|VALIDATING|VALIDATED|PUBLISHING|"")
                sleep 20
                ;;
              *)
                echo "Unexpected Central Portal deployment state: ${STATE}" >&2
                echo "${STATUS_JSON}" >&2
                exit 1
                ;;
            esac
          done

          echo "Timed out waiting for Central Portal deployment ${DEPLOYMENT_ID} to publish." >&2
          exit 1

      - name: Upload release AAR
        uses: actions/upload-artifact@v4
        with:
          name: aichatlib-${{ steps.release_version.outputs.version }}-aar
          path: ai-chat-lib/build/outputs/aar/*.aar
          if-no-files-found: error
